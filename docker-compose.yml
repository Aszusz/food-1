services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/aszusz/food-1-web:${TAG:-latest}}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api

  api:
    image: ${API_IMAGE:-ghcr.io/aszusz/food-1-api:${TAG:-latest}}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    environment:
      PORT: 3000
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      DATABASE_URL: postgres://${POSTGRES_USER:-household_cookbook}:${POSTGRES_PASSWORD:-household_cookbook}@postgres:5432/${POSTGRES_DB:-household_cookbook}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      WEB_URL: ${WEB_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  migrate:
    image: ${API_IMAGE:-ghcr.io/aszusz/food-1-api:${TAG:-latest}}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["bun", "--cwd", "packages/db", "drizzle-kit", "migrate"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-household_cookbook}:${POSTGRES_PASSWORD:-household_cookbook}@postgres:5432/${POSTGRES_DB:-household_cookbook}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-household_cookbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-household_cookbook}
      POSTGRES_DB: ${POSTGRES_DB:-household_cookbook}
    volumes:
      - postgres-18-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
            "pg_isready -U ${POSTGRES_USER:-household_cookbook} -d ${POSTGRES_DB:-household_cookbook}",
        ]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres-18-data:
